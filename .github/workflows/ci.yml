name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run audit:prod
      - run: npx --yes osv-scanner --lockfile=package-lock.json
      - name: MCP inspector smoke
        run: |
          npm run dev -- --port 8091 &
          SERVER_PID=$!
          sleep 4
          curl -sf http://127.0.0.1:8091/health
          kill $SERVER_PID
      - run: npm run build
